name: Standard Issue
description: Default template for features, bugs, and tasks
title: "[Issue Type]: <Short Task Name>"
labels: []
assignees: []
 
body:
 
  - type: markdown
    attributes:
      value: | 
        ## ISSUE DETAILS
 ---       
        #### IMPORTANT: ⚠️ Before submitting this issue, please scroll to the bottom of the GitHub issue page and select the following:
        
        - **Issue Type**
        - **Assignee**
        - **Appropriate Labels**
          - Priority
          - Level of Effort
          - Any additional applicable labels
        
        These selections are required for workflow management.
 ---
  - type: dropdown
    id: team-area
    attributes:
      label: Team / Area
      description: Select the team or area this issue belongs to.
      options:
        - Frontend
        - Backend
        - Data
        - DevOps
        - Design
    validations:
      required: true
 
  - type: input
    id: requested-by
    attributes:
      label: Requested By
      description: Name or team requesting this work.
      placeholder: "Name or Team"
    validations:
      required: true
 
  - type: textarea
    id: overview
    attributes:
      label: Overview
      description: Describe the task, issue, or request.
      placeholder: "Provide a clear and concise description..."
    validations:
      required: true
 
  - type: textarea
    id: context
    attributes:
      label: Context
      description: |
        Answer the following:
        - Why is this needed?
        - What problem does this solve?
        - What happens if we do not address it?
      placeholder: "Provide background and context..."
    validations:
      required: false
 
  - type: textarea
    id: success-criteria
    attributes:
      label: Success Criteria
      description: List the specific, testable conditions that define "done."
      placeholder: |
        - [ ] Requirement 1
        - [ ] Requirement 2
        - [ ] Requirement 3
    validations:
      required: false
 
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / Blockers
      description: List related tickets, blockers, approvals, or dependencies.
      placeholder: |
        - Depends on: #
        - Blocks: #
        - Waiting on approval from: 
    validations:
      required: false
 
  - type: textarea
    id: links-references
    attributes:
      label: Links / References
      description: |
         Add relevant documents, Figma links, screenshots, PRs, or supporting materials.
         ⚠️ **Note for UI-related bugs:**If this is a UI bug, please treat this section as required and include screenshots to support reproduction and review.
      placeholder: |
        - Figma: 
        - Screenshot: 
        - Related PR: #
        - Supporting doc: 
    validations:
      required: false
 
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Additional implementation details, risks, or context.
      placeholder: "Anything else the team should know..."
    validations:
      required: false
