name: List PR Environments

on:
  workflow_dispatch:

concurrency:
  group: list-pr-environments
  cancel-in-progress: true

jobs:
  list:
    if: vars.AWS_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: pr-previews
    permissions:
      id-token: write
      contents: read
      pull-requests: read
    env:
      AWS_REGION:   ${{ vars.AWS_REGION }}
      ECS_CLUSTER:  ${{ vars.ECS_CLUSTER }}
      ECR_REPO_URI: ${{ vars.ECR_REPO_URI }}

    steps:
      - name: Configure AWS credentials (PR role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PR_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: List deployed PR environments
        id: list
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ECR_REPO_NAME="${ECR_REPO_URI##*/}"

          # Collect all ECS service ARNs (paginated)
          SERVICE_ARNS=""
          NEXT_TOKEN=""
          while true; do
            if [[ -z "$NEXT_TOKEN" ]]; then
              PAGE=$(aws ecs list-services --cluster "$ECS_CLUSTER" --output json)
            else
              PAGE=$(aws ecs list-services \
                --cluster "$ECS_CLUSTER" \
                --starting-token "$NEXT_TOKEN" \
                --output json)
            fi

            ARNS=$(echo "$PAGE" | jq -r '.serviceArns[]?')
            if [[ -n "$ARNS" ]]; then
              SERVICE_ARNS+=$'\n'"$ARNS"
            fi

            NEXT_TOKEN=$(echo "$PAGE" | jq -r '.nextToken // empty')
            [[ -z "$NEXT_TOKEN" ]] && break
          done

          # Build PR number list and ARN lookup map from collected service ARNs.
          # Service names follow the pattern ep_app__water_data_tool_pr_<N>__<region>,
          # so we extract the number with grep -oE rather than anchoring on end-of-string.
          declare -A SERVICE_ARN_MAP
          PR_NUMS=""
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            NUM=$(echo "$line" | grep -oE 'water_data_tool_pr_[0-9]+' | sed 's/water_data_tool_pr_//' || true)
            if [[ -n "$NUM" ]]; then
              SERVICE_ARN_MAP[$NUM]="$line"
              PR_NUMS="$PR_NUMS $NUM"
            fi
          done <<< "$SERVICE_ARNS"
          PR_NUMS=$(echo "$PR_NUMS" | tr ' ' '\n' | grep -v '^$' | sort -n | uniq)

          if [[ -z "$PR_NUMS" ]]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "No PR preview environments found in ECS cluster \`$ECS_CLUSTER\`." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Describe ECS services in batches of 10 using full ARNs.
          declare -A RUNNING DESIRED ECS_DEPLOYED
          BATCH=()
          flush_batch() {
            [[ ${#BATCH[@]} -eq 0 ]] && return
            readarray -t DESCRIBED < <(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "${BATCH[@]}" \
              --query 'services[*].{name:serviceName,running:runningCount,desired:desiredCount,deployed:deployments[0].createdAt}' \
              --output json \
              | jq -c '.[]')
            for row in "${DESCRIBED[@]}"; do
              name=$(echo "$row" | jq -r '.name')
              n=$(echo "$name" | grep -oE 'water_data_tool_pr_[0-9]+' | sed 's/water_data_tool_pr_//')
              RUNNING[$n]=$(echo "$row" | jq -r '.running')
              DESIRED[$n]=$(echo "$row" | jq -r '.desired')
              ECS_DEPLOYED[$n]=$(echo "$row" | jq -r '.deployed // empty')
            done
            BATCH=()
          }

          for PR_NUM in $PR_NUMS; do
            BATCH+=("${SERVICE_ARN_MAP[$PR_NUM]}")
            if [[ ${#BATCH[@]} -eq 10 ]]; then
              flush_batch
            fi
          done
          flush_batch

          # Converts a UTC timestamp (Unix epoch or ISO 8601) to a human-readable ET string.
          fmt_ts() {
            local ts="$1"
            [[ "$ts" == "—" || -z "$ts" ]] && { echo "—"; return; }
            if [[ "$ts" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
              TZ='America/New_York' date -d "@${ts%%.*}" '+%B %-d, %Y %-I:%M %p %Z' 2>/dev/null || echo "$ts"
            else
              TZ='America/New_York' date -d "$ts" '+%B %-d, %Y %-I:%M %p %Z' 2>/dev/null || echo "$ts"
            fi
          }

          # Build markdown table
          {
            echo "## PR preview environments"
            echo ""
            echo "| PR | URL | Last image push (ET) | ECS rollout (ET) | Tasks | PR state |"
            echo "|---:|---|---|---|---:|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          COUNT=0
          for PR_NUM in $PR_NUMS; do
            URL="https://water-data-tool-pr-${PR_NUM}.policyinnovation.info/"

            PUSHED=$(aws ecr describe-images \
              --repository-name "$ECR_REPO_NAME" \
              --image-ids "imageTag=pr-${PR_NUM}-latest" \
              --query 'imageDetails[0].imagePushedAt' \
              --output text 2>/dev/null || echo "")
            [[ "$PUSHED" == "None" || -z "$PUSHED" ]] && PUSHED="—"

            ECS_AT="${ECS_DEPLOYED[$PR_NUM]:-—}"
            RUN="${RUNNING[$PR_NUM]:-0}"
            WANT="${DESIRED[$PR_NUM]:-0}"

            STATE="—"
            if PR_JSON=$(gh pr view "$PR_NUM" --json state --repo ${{ github.repository }} 2>/dev/null); then
              STATE=$(echo "$PR_JSON" | jq -r '.state')
            else
              STATE="not found"
            fi

            echo "| #${PR_NUM} | [${URL}](${URL}) | $(fmt_ts "$PUSHED") | $(fmt_ts "$ECS_AT") | ${RUN}/${WANT} | ${STATE} |" \
              >> "$GITHUB_STEP_SUMMARY"
            COUNT=$((COUNT + 1))
          done

          {
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Environments listed** | ${COUNT} |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **Time** | $(TZ='America/New_York' date '+%B %-d, %Y %-I:%M %p %Z') |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
