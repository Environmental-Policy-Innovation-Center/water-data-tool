name: Teardown Stale PR Environments

on:
  workflow_dispatch:
    inputs:
      days_old:
        description: 'Destroy PRs with no new commits in this many days (default: 14)'
        required: false
        default: '14'
      confirm:
        description: 'Type "teardown" to confirm'
        required: true

concurrency:
  group: teardown-stale-pr-envs
  cancel-in-progress: false

jobs:
  teardown:
    if: >
      vars.AWS_DEPLOY_ENABLED == 'true' &&
      github.event.inputs.confirm == 'teardown'
    runs-on: ubuntu-latest
    environment: pr-teardowns
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      deployments: write
    env:
      AWS_REGION:            ${{ vars.AWS_REGION }}
      ECS_CLUSTER:           ${{ vars.ECS_CLUSTER }}
      SERVICE_BUILDER_IMAGE: ${{ vars.SERVICE_BUILDER_IMAGE_URI }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (PR role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PR_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve stale PR list
        id: prs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          DAYS="${{ github.event.inputs.days_old }}"
          CUTOFF=$(date -u -d "${DAYS} days ago" '+%Y-%m-%dT%H:%M:%SZ')

          SERVICES=$(aws ecs list-services \
            --cluster "$ECS_CLUSTER" \
            --output text \
            | tr '\t' '\n' \
            | (grep -oE 'water_data_tool_pr_[0-9]+' || true) \
            | sed 's/water_data_tool_pr_//')

          STALE=""
          for PR_NUM in $SERVICES; do
            HEAD_SHA=$(gh pr view "$PR_NUM" \
              --repo "$GITHUB_REPOSITORY" \
              --json headRefOid \
              --jq '.headRefOid' 2>/dev/null || echo "")
            LAST_COMMIT=""
            if [[ -n "$HEAD_SHA" ]]; then
              LAST_COMMIT=$(gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA" \
                --jq '.commit.committer.date' 2>/dev/null || echo "")
            fi

            if [[ -z "$LAST_COMMIT" ]]; then
              echo "PR #$PR_NUM — not found or closed, marking stale"
              STALE="$STALE $PR_NUM"
            elif [[ "$LAST_COMMIT" < "$CUTOFF" ]]; then
              echo "PR #$PR_NUM — last commit $LAST_COMMIT, stale"
              STALE="$STALE $PR_NUM"
            else
              echo "PR #$PR_NUM — last commit $LAST_COMMIT, still active, skipping"
            fi
          done

          echo "list=$(echo "$STALE" | xargs)" >> "$GITHUB_OUTPUT"

      - name: Tear down stale environments
        env:
          PR_LIST: ${{ steps.prs.outputs.list }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -z "$PR_LIST" ]]; then
            echo "No stale PR environments found — nothing to tear down."
            exit 0
          fi

          for PR_NUM in $PR_LIST; do
            echo "── Tearing down PR #${PR_NUM} ──"

            NODE_SG_ID=$(aws ec2 describe-security-groups \
              --filters "Name=group-name,Values=epapp__nodes_water_data_tool_pr_${PR_NUM}__dev_us-east-1" \
              --query 'SecurityGroups[0].GroupId' --output text)
            if [ -n "$NODE_SG_ID" ] && [ "$NODE_SG_ID" != "None" ]; then
              aws ec2 revoke-security-group-ingress \
                --group-id "${{ vars.RDS_SG_ID }}" \
                --protocol tcp \
                --port 5432 \
                --source-group "$NODE_SG_ID" || true
            fi

            "$GITHUB_WORKSPACE/script/teardown_pr_environment" "$PR_NUM"

            gh pr close "${PR_NUM}" \
              --repo "$GITHUB_REPOSITORY" \
              --comment "Preview environment torn down — PR closed due to inactivity (no commits in ${{ github.event.inputs.days_old }} days)." || \
            gh pr comment "${PR_NUM}" \
              --repo "$GITHUB_REPOSITORY" \
              --body "Preview environment torn down — PR was already closed (no commits in ${{ github.event.inputs.days_old }} days)."

            echo "PR #${PR_NUM} torn down."
          done

      - name: Summary
        env:
          PR_LIST: ${{ steps.prs.outputs.list }}
        run: |
          {
            echo "## Stale PR environment teardown"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Staleness threshold** | ${{ github.event.inputs.days_old }} days |"
            echo "| **PRs torn down** | \`$(echo "$PR_LIST" | tr ' ' ',')\` |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |"
          } >> "$GITHUB_STEP_SUMMARY"
