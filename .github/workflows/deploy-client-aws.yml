name: Deploy to AWS ECS

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

concurrency:
  group: deploy-pr-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  # ── PR environment deploy ───────────────────────────────────────────────────
  pr-deploy:
    if: >
      vars.AWS_DEPLOY_ENABLED == 'true' &&
      github.event_name == 'pull_request' &&
      github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: pr-previews
      url: https://water-data-tool-pr-${{ github.event.number }}.policyinnovation.info/
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      deployments: write
    env:
      AWS_REGION:      ${{ vars.AWS_REGION }}
      ECR_REPO_URI:    ${{ vars.ECR_REPO_URI }}
      ECS_CLUSTER:     ${{ vars.ECS_CLUSTER }}
      PR_NUM:          ${{ github.event.number }}
      SERVICE_BUILDER_IMAGE: ${{ vars.SERVICE_BUILDER_IMAGE_URI }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (PR role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PR_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push PR image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REPO_URI }}:pr-${{ env.PR_NUM }}-${{ github.sha }}
            ${{ env.ECR_REPO_URI }}:pr-${{ env.PR_NUM }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Look up secret ARNs
        id: secrets
        run: |
          MASTER_KEY_ARN=$(aws secretsmanager describe-secret \
            --secret-id "ep/wdt/dev/rails_master_key" \
            --query 'ARN' --output text)
          MAPBOX_ARN=$(aws secretsmanager describe-secret \
            --secret-id "ep/wdt/dev/mapbox_access_token" \
            --query 'ARN' --output text)
          MAPBOX_STYLE_ARN=$(aws secretsmanager describe-secret \
            --secret-id "ep/wdt/dev/mapbox_style_url" \
            --query 'ARN' --output text)
          DB_URL_ARN=$(aws secretsmanager describe-secret \
            --secret-id "ep/wdt/dev/database_url" \
            --query 'ARN' --output text)

          echo "master_key_arn=$MASTER_KEY_ARN"     >> "$GITHUB_OUTPUT"
          echo "mapbox_arn=$MAPBOX_ARN"             >> "$GITHUB_OUTPUT"
          echo "mapbox_style_arn=$MAPBOX_STYLE_ARN" >> "$GITHUB_OUTPUT"
          echo "db_url_arn=$DB_URL_ARN"             >> "$GITHUB_OUTPUT"

      - name: Create PR environment via service_builder
        run: |
          SECRETS_JSON=$(jq -cn \
            --arg mk    "${{ steps.secrets.outputs.master_key_arn }}" \
            --arg db    "${{ steps.secrets.outputs.db_url_arn }}:preview::" \
            --arg mbx   "${{ steps.secrets.outputs.mapbox_arn }}" \
            --arg style "${{ steps.secrets.outputs.mapbox_style_arn }}" \
            '[
              {"name":"RAILS_MASTER_KEY",    "valueFrom":$mk},
              {"name":"DATABASE_URL",        "valueFrom":$db},
              {"name":"MAPBOX_ACCESS_TOKEN", "valueFrom":$mbx},
              {"name":"MAPBOX_STYLE_URL",    "valueFrom":$style}
            ]')

          ENV_VARS_JSON='[
            {"name":"RAILS_ENV",           "value":"production"},
            {"name":"RAILS_LOG_TO_STDOUT", "value":"1"},
            {"name":"SOLID_QUEUE_IN_PUMA", "value":"true"},
            {"name":"HTTP_PORT",           "value":"3000"},
            {"name":"TARGET_PORT",         "value":"3001"},
            {"name":"ETL_SOURCE_URL",      "value":"${{ vars.ETL_SOURCE_URL }}"}
          ]'

          docker run --rm \
            -e EP_ACTION=apply \
            -e EP_ENV="pr-${{ env.PR_NUM }}" \
            -e EP_SERVICE_NAME="water_data_tool_pr_${{ env.PR_NUM }}" \
            -e EP_SERVICE_SHORT_NAME="pr${{ env.PR_NUM }}" \
            -e EP_ECS_CLUSTER_NAME="$ECS_CLUSTER" \
            -e EP_TF_STATE_S3_BUCKET_NAME="ep-service-builder" \
            -e EP_SERVICE_INSTANCE_TYPE="t3.small" \
            -e EP_SERVICE_INSTANCE_COUNT="1" \
            -e EP_SERVICE_CONTAINER_RAM_MB="1700" \
            -e EP_SERVICE_CONTAINER_IMAGE_URI="${{ env.ECR_REPO_URI }}:pr-${{ env.PR_NUM }}-${{ github.sha }}" \
            -e EP_SERVICE_DOMAIN="water-data-tool-pr-${{ env.PR_NUM }}.policyinnovation.info" \
            -e EP_SERVICE_PORT="3000" \
            -e EP_SERVICE_HEALTH_PORT="3000" \
            -e EP_SERVICE_HEALTH_CHECK_PATH="/up" \
            -e EP_SERVICE_ENV_VARS_JSON="$ENV_VARS_JSON" \
            -e EP_SERVICE_SECRETS_JSON="$SECRETS_JSON" \
            -e EP_CREATE_ECR_REPO="false" \
            -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
            -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
            -e AWS_SESSION_TOKEN="$AWS_SESSION_TOKEN" \
            -e AWS_REGION="$AWS_REGION" \
            "$SERVICE_BUILDER_IMAGE"

      - name: Allow PR nodes to reach RDS
        run: |
          NODE_SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=epapp__nodes_water_data_tool_pr_${{ env.PR_NUM }}__dev_us-east-1" \
            --query 'SecurityGroups[0].GroupId' --output text)
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ vars.RDS_SG_ID }}" \
            --protocol tcp \
            --port 5432 \
            --source-group "$NODE_SG_ID" || true

      - name: Wait until latest deployment is reachable
        run: |
          TARGET_IMAGE="${{ env.ECR_REPO_URI }}:pr-${{ env.PR_NUM }}-${{ github.sha }}"
          PR_URL="https://water-data-tool-pr-${{ env.PR_NUM }}.policyinnovation.info/up"
          MAX_ATTEMPTS=60
          ATTEMPT=0
          IMAGE_FOUND=false

          echo "Resolving ECS service ARN for PR ${{ env.PR_NUM }}..."
          SERVICE_ARN=$(aws ecs list-services \
            --cluster "$ECS_CLUSTER" \
            --output text \
            | tr '\t' '\n' \
            | grep "water_data_tool_pr_${{ env.PR_NUM }}")
          echo "Service ARN: $SERVICE_ARN"

          echo "Phase 1: waiting for ECS to run image $TARGET_IMAGE (up to 15 min)..."
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            TASK_ARNS=$(aws ecs list-tasks \
              --cluster "$ECS_CLUSTER" \
              --service-name "$SERVICE_ARN" \
              --desired-status RUNNING \
              --query 'taskArns' --output json 2>/dev/null || echo "[]")
            if [ "$(echo "$TASK_ARNS" | jq 'length')" -gt 0 ]; then
              IMAGES=$(aws ecs describe-tasks \
                --cluster "$ECS_CLUSTER" \
                --tasks $(echo "$TASK_ARNS" | jq -r '.[]') \
                --query 'tasks[*].containers[*].image' \
                --output json)
              if echo "$IMAGES" | jq -e --arg img "$TARGET_IMAGE" 'flatten | any(. == $img)' > /dev/null; then
                echo "[$ATTEMPT/$MAX_ATTEMPTS] New image confirmed running."
                IMAGE_FOUND=true
                break
              fi
            else
              echo "[$ATTEMPT/$MAX_ATTEMPTS] No running tasks yet, waiting..."
            fi
            sleep 15
          done
          if [ "$IMAGE_FOUND" != "true" ]; then
            echo "ERROR: timed out after 15 minutes waiting for new image to start."
            exit 1
          fi

          ATTEMPT=0
          MAX_ATTEMPTS=20
          echo "Phase 2: polling $PR_URL until HTTP 200 (up to 5 min)..."
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "$PR_URL" || echo "000")
            echo "[$ATTEMPT/$MAX_ATTEMPTS] HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Service is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "ERROR: new image is running but $PR_URL did not return 200 within 5 minutes."
          exit 1

      - name: Comment URL on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL="https://water-data-tool-pr-${{ env.PR_NUM }}.policyinnovation.info/"
          gh pr comment ${{ env.PR_NUM }} \
            --body "**Preview environment deployed:** $PR_URL" \
            --edit-last || \
          gh pr comment ${{ env.PR_NUM }} \
            --body "**Preview environment deployed:** $PR_URL"

      - name: Summary
        run: |
          PR_URL="https://water-data-tool-pr-${{ env.PR_NUM }}.policyinnovation.info/"
          echo "PR #${{ env.PR_NUM }} deployed → $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`${{ env.ECR_REPO_URI }}:pr-${{ env.PR_NUM }}-${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ── PR environment teardown ─────────────────────────────────────────────────
  pr-teardown:
    if: >
      vars.AWS_DEPLOY_ENABLED == 'true' &&
      github.event_name == 'pull_request' &&
      github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment:
      name: pr-previews
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      deployments: write
    env:
      AWS_REGION:            ${{ vars.AWS_REGION }}
      ECS_CLUSTER:           ${{ vars.ECS_CLUSTER }}
      PR_NUM:                ${{ github.event.number }}
      SERVICE_BUILDER_IMAGE: ${{ vars.SERVICE_BUILDER_IMAGE_URI }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (PR role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PR_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tear down PR environment
        uses: ./.github/actions/teardown-pr
        with:
          pr_number: ${{ env.PR_NUM }}
          rds_sg_id: ${{ vars.RDS_SG_ID }}

      - name: Comment teardown on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ env.PR_NUM }} \
            --repo ${{ github.repository }} \
            --body "**Preview environment torn down.** This PR has been closed." \
            --edit-last || \
          gh pr comment ${{ env.PR_NUM }} \
            --repo ${{ github.repository }} \
            --body "**Preview environment torn down.** This PR has been closed."

      - name: Summary
        run: |
          echo "PR #${{ env.PR_NUM }} environment torn down." >> "$GITHUB_STEP_SUMMARY"
