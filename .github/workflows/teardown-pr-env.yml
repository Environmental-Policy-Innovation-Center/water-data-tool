name: Teardown PR Environment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to destroy'
        required: true
      confirm:
        description: 'Type "teardown" to confirm'
        required: true

concurrency:
  group: teardown-pr-env-${{ github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  teardown:
    if: >
      vars.AWS_DEPLOY_ENABLED == 'true' &&
      github.event.inputs.confirm == 'teardown'
    runs-on: ubuntu-latest
    environment: pr-teardowns
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      deployments: write
    env:
      AWS_REGION:            ${{ vars.AWS_REGION }}
      ECS_CLUSTER:           ${{ vars.ECS_CLUSTER }}
      SERVICE_BUILDER_IMAGE: ${{ vars.SERVICE_BUILDER_IMAGE_URI }}
      PR_NUM:                ${{ github.event.inputs.pr_number }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (PR role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PR_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tear down PR environment
        uses: ./.github/actions/teardown-pr
        with:
          pr_number: ${{ env.PR_NUM }}
          rds_sg_id: ${{ vars.RDS_SG_ID }}

      - name: Close PR and comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr close "${PR_NUM}" \
            --repo ${{ github.repository }} \
            --comment "Preview environment torn down by @${{ github.actor }}. Closing PR." || \
          gh pr comment "${PR_NUM}" \
            --repo ${{ github.repository }} \
            --body "Preview environment torn down by @${{ github.actor }}. (PR may already be closed.)"

      - name: Summary
        run: |
          {
            echo "## PR environment teardown"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **PR** | #${PR_NUM} |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |"
          } >> "$GITHUB_STEP_SUMMARY"
