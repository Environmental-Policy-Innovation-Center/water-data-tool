default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
<% if ENV.fetch("SOLID_QUEUE_ROLE", "web") == "worker" %>
    - queues: etl
      threads: 1
      processes: 1
      polling_interval: 1
    - queues: tile_refresh
      threads: 1
      processes: 1
      polling_interval: 1
    - queues: tile_warm
      threads: 1
      processes: 1
      polling_interval: 1
<% else %>
    - queues: default
      threads: 1
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
<% end %>

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
