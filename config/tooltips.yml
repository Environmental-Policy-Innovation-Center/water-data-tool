filter_menus:
  # Source — categories
  primary_type: "The source of your water can affect its quality and safety. Most of the drinking water in the U.S. comes from reservoirs, lakes, rivers, or water under the ground."
  source_protection: "Source water protections safeguard, maintain, and improve the quality and/or quantity of drinking water. Please note the availability of this data varies by state."
  wholesaler: "Wholesalers treat source water and then provide some or all of that water to other public water systems."

  # Boundaries — categories
  boundary_type: "Service area boundaries show the extent of the area served by a water system. Modeled systems are estimated based on the quality of available data."

  # Compliance — categories
  violations: "Violations occur when a water system fails to meet drinking water standards. Systems with violations, especially health-based ones, can face penalties and are required to notify customers."
  awia_certifications: "Some water systems are required to submit assessments and plans to comply with the America's Water Infrastructure Act."
  boil_water_notices: "Boil water notices are issued when there is a potential for bacterial contamination in the tap water, often due to issues like loss of pressure from main breaks, equipment failure, or flooding. These can be planned or unplanned."

  # Population — categories
  population_size: "The Environmental Protection Agency classifies public water systems into five size categories based on population served."

  # More — categories
  funding_2021_2025: "The Drinking Water State Revolving Fund program assists public water systems in financing the cost of drinking water infrastructure projects needed to achieve or maintain compliance with Safe Drinking Water Act. Data here comes from EPA's SRF Portal."

  # Violations - Count
  groundwater_rule: "The ground water rule provides protection against microbial pathogens in public water systems using ground water sources."
  surface_water_treatment: "The surface water treatment rules require water systems to filter and disinfect surface water sources."
  lead_and_copper: "The lead and copper rule requires public water systems to take action when they fail to meet the rule's requirements such as corrosion control, public notifications, or service line replacement."
  radionuclides: "Violations for radionuclides in drinking water involve exceeding legal limits for radioactive contaminants."
  inorganic_chemicals: "Violations for inorganic chemicals in drinking water involve exceeding legal limits for contaminants like arsenic, nitrate, and lead."
  synthetic_organic_chemicals: "Violations for synthetic organic chemicals occur when the maximum contaminant levels are exceeded."
  volatile_organic_chemicals: "Violations for volatile organic chemicals occur when the maximum contaminant levels are exceeded."
  total_coliform: "Violations for coliforms occur when more than five percent of samples taken from public water systems contain coliforms."
  stage_1_disinfectants: "Violations for stage 1 disinfectants occur when public water systems exceed the maximum contaminant levels for disinfectants and byproducts."
  stage_2_disinfectants: "Violations for stage 2 disinfectants occur when public water systems exceed the maximum exposures for total trihalomethanes and haloacetic acids, byproducts in water disinfected with chlorine or chloramine."

  # AWIA Certifications
  rra_certification: "This assessment evaluates the threat of potential malevolent acts and natural hazards."

  # Population — Change
  population_change: "Population change shows the percent change in total population served by the water system from 2021 & 2011."
  income_change: "Median household income change shows the percent change in median household income for the service area from 2021 & 2011."

  # Population — Socioeconomics
  poverty_rate: "Poverty rate is the percentage of households in the service area living below the federal poverty level."
  unemployment_rate: "Unemployment rate is the percentage of the labor force in the service area that is unemployed and actively seeking work."
  median_household_income: "Median household income is the midpoint income for all households in the service area, based on the most recent Census data."
  higher_education: "Higher education rate is the percentage of the population whose highest level of educational attainment is a bachelor's degree."
  children_under_5: "Children under 5 is the percentage of the service area population aged 4 years and younger, a group with heightened sensitivity to water quality issues."
  elderly_over_61: "Elderly population is the percentage of the service area population aged 61 and older, a group with increased vulnerability to water quality impacts."

  # Population — Race/Ethnicity
  people_of_color: "People of color is the percentage of the service area population identifying as any race other than non-Hispanic white alone."
  white: "White is the percentage of the service area population identifying as white alone (non-Hispanic)."
  black: "Black is the percentage of the service area population identifying as Black or African American alone."
  aian: "American Indian / Alaska Native is the percentage of the service area population identifying as American Indian or Alaska Native alone."
  napi: "Native Hawaiian / Pacific Islander is the percentage of the service area population identifying as Native Hawaiian or Other Pacific Islander alone."
  asian: "Asian is the percentage of the service area population identifying as Asian alone."
  latino: "Hispanic or Latino is the percentage of the service area population identifying as Hispanic or Latino of any race."
  other_race: "Other race is the percentage of the service area population identifying as some other race alone."
  mixed_race: "Mixed race is the percentage of the service area population identifying as two or more races."

  # Population — Vulnerability
  cejst_disadvantaged: "The Climate and Economic Justice Screening Tool (CEJST) percentage shows what share of census tracts in the service area are identified as disadvantaged — overburdened and underserved communities prioritized for federal environmental investments."
  svi: "The CDC Social Vulnerability Index (SVI) overall percentile ranks communities by their social vulnerability — higher percentiles indicate greater vulnerability during public health emergencies or disasters."
  cvi: "The US Climate Vulnerability Index (CVI) overall score measures the degree to which communities face challenges from climate change — higher scores indicate greater vulnerability."

  # More — Financial
  annual_water_sewer_bill: "Annual water and sewer bill data comes from the Census. Data here represents the mode or most common rate paid by the service population and does not represent direct water system rates."

  # More — Funding
  srf_financing: "The Drinking Water State Revolving Fund (SRF) provides financing to public water systems for infrastructure improvements. This shows the number of times a system has received SRF financing."
  srf_assistance: "Total SRF assistance is the cumulative dollar amount of State Revolving Fund loans and other assistance received by the water system."
  principal_forgiveness: "Principal forgiveness is a form of SRF assistance that does not require repayment — effectively a grant. This shows the total principal forgiveness amount received by the water system."

  # More — Environmental / Watershed Hazards
  watershed_hazards: "These filters can be used to evaluate potential environmental hazards within the watershed the system is pulling from."
  source_water_connections: "This variable shows the number of source water connections, ground and surface, this water system has, as found in EPA's How's My Waterway."
  pollution_permits: "Discharge points are permitted to regulate contaminants released into the environment. This shows the number of permits with violations in the water system's source watershed."
  underground_storage_tanks: "Underground storage tanks are often safe, but some may leak into the environment. This shows the number of active underground storage tanks in the water system's source watershed."
  risk_management_facilities: "Facilities that handle hazardous substances are required to have a risk management plan. This shows the number of facilities with risk management plans in the water system's source watershed."
  impaired_streams: "Depending on water quality measurements, a waterbody may be impaired or threatened. This shows the number of impaired or threatened streams within a water system's source watershed. Note, there may be state to state differences in this data."

# Data export affordances
exports:
  geojson: "GeoJSON files can be exported here by state and additional filtering. Full data downloads are also available on the Downloads page."

# State-specific boil water notice metadata — shown in the Notices filter tooltip when scoped to a BWN state.
# Each entry: text (methodology note) + source_url (state agency data page).
boil_water_notices_states:
  AK:
    text: "Continuous data collection started on Sept 10th, 2025, and updates are completed quarterly. Please refer to the source link for the most current information."
    source_url: "https://gis.data.alaska.gov/datasets/ADEC::boil-water-and-do-not-drink-notice-open/explore?location=56.210819%2C-157.551116%2C7.85&showTable=true"
  AR:
    text: "The last update of this dataset occurred on Feb 3rd, 2026. This is not a comprehensive record. Please refer to the source link for the most current information."
    source_url: "https://health.arkansas.gov/wa_engTraining/boilwaterorder.aspx"
  LA:
    text: "The last update of this dataset was completed on July 9th, 2025. Due to data download limits, this dataset includes system-issued boil water notices from 2024-2025, and state-issued boil water advisories that were open from 2020-2025. This is not a comprehensive record. Please refer to the source link for the most current information."
    source_url: "https://sdw.ldh.la.gov/"
  MA:
    text: "The last update of this dataset occurred on Oct 30th, 2025 and we are working on updating this dataset. Please refer to the source link for the most current information."
    source_url: "https://eeaonline.eea.state.ma.us/DEP/Boil_Order/"
  ME:
    text: "Continuous data collection started on Sept 12th, 2025, and updates are completed quarterly. This is not a comprehensive record, as water system IDs are not always provided. Please refer to the source link for the most current information."
    source_url: "https://www.maine.gov/dhhs/mecdc/healthy-living/health-safety/drinking-water-safety/information-for-consumers/drinking-water-safety-alerts"
  MO:
    text: "Continuous data collection started on Sept 25th, 2025, and updates are completed quarterly. This is not a comprehensive record, as this dataset only contains advisories from long-term contaminant issues. Please refer to the source link for the most current information."
    source_url: "https://data.mo.gov/Regulatory/DNR-WPP-Boil-Order-Report/j2a5-itxh/data_preview"
  NM:
    text: "Continuous data collection started on Oct 2nd, 2025, and updates are completed quarterly. This is not a comprehensive record, as water system IDs are not always provided. Please refer to the source link for the most current information."
    source_url: "https://www.env.nm.gov/drinking_water/boil-water-advisories/"
  OH:
    text: "The last update of this dataset occurred on July 30th, 2025. This dataset is no longer maintained by the state of Ohio, and is not a comprehensive record. Please refer to your water system for the most current information."
    source_url: "https://geo.epa.ohio.gov/portal/apps/experiencebuilder/experience/?id=72cf2af9e2dd459aa5d758b54fb10c0c&page=Page-1&views=About"
  OR:
    text: "Continuous data collection started on Oct 2nd, 2025, and updates are completed quarterly. Please refer to the source link for the most current information."
    source_url: "https://yourwater.oregon.gov/advisories.php?areasw=x&areap=x&popa=x&popv=x&open=x&lifted=x&begin=&end=&sort=start"
  RI:
    text: "The last update of this dataset occurred on July 30th, 2025, and we are working on updating this dataset. Some records may be missing the date the advisory was issued because that information is not provided for recently lifted advisories. Please refer to the source link for the most current information."
    source_url: "https://health.ri.gov/drinking-water-quality/information/public-water-emergency-information-consumers"
  TX:
    text: "The last update of this dataset was completed on April 17th, 2024 through a Freedom of Information Act Request (FOIA). This is not a comprehensive record, and we are working to automatically update this dataset in the future using the data contained in the source link. Please refer to the source link for the most current information, as it is provided on the state SDWIS website."
    source_url: "https://dww2.tceq.texas.gov/DWW/JSP/SearchDispatch?number=&name=&ActivityStatusCD=All&county=All&WaterSystemType=All&SourceWaterType=All&SampleType=null&begin_date=10%2F28%2F2023&end_date=10%2F28%2F2025&action=Search+For+Water+Systems"
  WA:
    text: "Continuous data collection started on Sept 12th, 2025, and updates are completed quarterly. This is not a comprehensive record, as water system IDs are not always provided. Please refer to the source link for the most current information."
    source_url: "https://doh.wa.gov/community-and-environment/drinking-water/active-alerts?county=All&combine="
  WV:
    text: "Continuous data collection started on Oct 2nd, 2025, and updates are completed quarterly. Please note that a water system in this dataset may report multiple & potentially separate advisories on the same day. They are treated as distinct advisories, and therefore numbers may appear large. Please refer to the source link for the most current information."
    source_url: "https://oehsportal.wvdhhr.org/boilwater"
