# ─────────────────────────────────────────────────────────────────────────────
# FIELD MANIFEST — read by FieldRegistry (app/fields/field_registry.rb).
# Owns what each data field IS — its identity, how it loads, and how it shows / filters / charts.
# ARRANGEMENT (where things appear) lives in the layout files: config/filter_layout.yml (filter
# menus) and config/table_layout.yml (table columns). See docs/CONFIG_AUDIT.md.
#
# WHAT BELONGS HERE: every data field the app SURFACES or INGESTS — i.e. every field that is
# shown as a table column, filtered on, drawn as a histogram, OR loaded from a source file.
# This is NOT the full database schema: the pipeline loads more columns than appear here, and a
# field is added only when we choose to ingest and/or surface it. A field earns a place by having
# at least one of the four blocks below; omit a block to leave that capability off:
#   source    → loaded from a source file (a field may be source-only: ingested but not surfaced)
#   display   → shown as a column in the data table
#   filter    → filterable (this makes it a Filter / Sub-filter; its MENU placement + grouping
#               live in config/filter_layout.yml, not here — see docs/CONFIG_AUDIT.md §8.4)
#   histogram → has a histogram
#
# Menus, categories, and parent-filters (filter grouping / check-all tools) are NOT fields and do
# NOT appear here — they live only in config/filter_layout.yml.
#
# ── CANONICAL ENTRY SHAPE — keys ALWAYS appear in this order; omit any block/key a field
#    does not have. Omission is the signal; we do not pad with nils. ──────────────────────
#
#   poverty_rate:                       # the name we store this column as (used throughout the app)
#     model: demographic                # which table it's stored in / loaded into
#     db_column: poverty_rate           # the real DB column, only if it differs from the name above (usually omit)
#     source:                           # how it's loaded from the data feed (omit → not loaded here; or a custom loader, see custom_imports)
#       file: epa_sabs_xwalk            #   source file name (no extension)
#       header: "hh_below_pov_per"      #   the column's exact name in that CSV — always quoted, copied verbatim
#       cast: decimal                   #   value type: integer | decimal | string | score (0–1 → %) | bool (omit → keep raw text)
#     display:                          # TABLE COLUMN (omit → not shown in the data table)
#       label: "Households below poverty line"  #   <th> header text
#       sort: poverty_rate              #   sort param (omit → not sortable); may differ from key (capped trends)
#       format: pct                     #   str | num | dec | pct | cur | bool | check | link | copy
#       format_opts: {precision: 1}     #   extra formatting opts (omit if none)
#       size: default                   #   default | sm | wide | pinned | check (omit → default)
#       row_header: true                #   sticky row header (pws_name only; omit → false)
#       csv_label: "...the poverty line (%)"    #   verbose CSV header
#     filter:                           # FILTERABLE via URL param (omit → not filterable)
#       kind: range                     #   range | radio | bool | multiselect
#       param: has_source_protection    #   URL param (radio/bool/multiselect)
#       column: population_pct_change_capped    # column the filter targets (omit → db_column)
#       param_base: density             #   URL param base for range _min/_max (omit → db_column)
#       coercion: decimal               #   decimal | integer (range only)
#       label: "Poverty rate"           #   MENU label (often differs from display.label; omit for radio/multiselect — they use options)
#       tooltip: poverty_rate           #   tooltips.yml key (omit if none)
#       checked_value: Certified        #   bool only — value compared against when checked (omit → real boolean true)
#       has_select_all: true            #   multiselect only — render a select-all/deselect-all control (omit → none)
#       options:                        #   radio + multiselect ONLY — the discrete choices (range/bool never use it); list one block per choice
#         - {value: GW, label: "Ground only", default: true}   #   value stored, label shown; default: true = selected at load
#         - {value: SW, label: "Surface only"}                 #   add as many option blocks as the filter has choices
#     histogram:                        # HISTOGRAM-capable (omit → no histogram)
#       format: percent                 #   percent | currency | count | percent_change
#       column: population_pct_change_capped    # histogram column (omit → db_column)
#
# A displayed field is exported to CSV / GeoJSON automatically using its model's table and
# column — there is no export key to declare (only `check`, which has no model, is skipped).
#
# ARRANGEMENT lives in the layout files, not here:
# - filter menu/category/order/nesting in config/filter_layout.yml
# - table column order, pinned columns, and picker category in config/table_layout.yml
# Tooltip copy lives in config/tooltips.yml; the manifest references it by key.
# ─────────────────────────────────────────────────────────────────────────────

# Query params that are accepted from the URL but have NO owning field below — so they can't
# be auto-permitted from a field's filter.kind. They drive the map viewport / geographic scope
# (bounds = map bbox, county_geoid + state = location), not a column filter.
# FieldRegistry.permit_arguments adds these to the permit list verbatim.
# Add a param here only when the app must read it from the URL but no fields entry declares it.
passthrough_params: [bounds, county_geoid, state]

# Source files that need special handling on load
# — combining rows, geometry, or computed values, instead of a plain column-to-column copy.
# - Each lists the table it fills and why.
custom_imports:
  epa_sabs:                  {model: public_water_system, reason: "computes the state code from the PWSID; tracks which systems changed"}
  epa_sabs_geoms:            {model: public_water_system, reason: "GeoJSON geometry file, not a flat CSV"}
  pwsid_npdes_usts_rmps_imp: {model: watershed_hazard,    reason: "sums the per-HUC12 watershed rows into one row per system"}
  sabs_pwsid_county:         {model: public_water_system, reason: "combines the counties served into one deduplicated list per system"}
  sdwis_viols:               {model: violations_summary,  reason: "splits one source file across two tables (public_water_systems + violations_summary)"}

fields:
  # ── Row selection / identity (pinned, ungrouped) ───────────────────────────
  check:
    display: {format: check, size: check}

  pws_name:
    model: public_water_system
    display: {label: "Utility Name", sort: pws_name, format: str, size: pinned, row_header: true, csv_label: "Utility Name"}

  # ── Utility details ────────────────────────────────────────────────────────
  pwsid:
    model: public_water_system
    display: {label: "Utility ID", sort: pwsid, format: copy, csv_label: "Utility ID"}

  epa_report:
    model: public_water_system
    db_column: detailed_facility_report
    display: {label: "EPA Facility Report", format: link, size: sm, csv_label: "EPA Facility Report"}

  stusps:
    model: public_water_system
    display: {label: "State", sort: stusps, format: str, size: sm, csv_label: "State"}

  counties:
    model: public_water_system
    display: {label: "County", sort: counties, format: str, size: wide, csv_label: "County"}

  gw_sw_code:
    model: public_water_system
    display: {label: "Source type", sort: gw_sw_code, format: str, csv_label: "Source type"}
    filter:
      kind: radio
      param: gw_sw_code
      options:
        - {value: ~, label: "Both ground and surface", default: true}   # null value = no filter
        - {value: Groundwater, label: "Ground only"}
        - {value: "Surface Water", label: "Surface only"}

  source_water_protection_code:
    model: public_water_system
    display: {label: "Has source water protection", sort: source_water_protection_code, format: bool, csv_label: "Has source water protection"}
    filter: {kind: bool, param: has_source_protection, label: "Has source protection", tooltip: source_protection}

  owner_type:
    model: public_water_system
    display: {label: "Ownership", sort: owner_type, format: str, csv_label: "Ownership"}
    filter:
      kind: multiselect
      param: owner_type
      has_select_all: true
      options:
        - {value: Federal, label: "Federal", default: true}
        - {value: State, label: "State", default: true}
        - {value: Local, label: "Local", default: true}
        - {value: "Native American", label: "Tribal", default: true}
        - {value: Private, label: "Private", default: true}
        - {value: "Public/Private", label: "Public/Private partnership", default: true}

  primacy_type:
    model: public_water_system
    display: {label: "Authority", sort: primacy_type, format: str, csv_label: "Authority"}
    filter:
      kind: multiselect
      param: primacy_type
      options:
        - {value: State, label: "State", default: true}
        - {value: Tribal, label: "Tribal", default: true}
        - {value: Territory, label: "Territory", default: true}

  is_wholesaler:
    model: public_water_system
    display: {label: "Wholesaler", sort: is_wholesaler, format: bool, csv_label: "Wholesaler"}
    filter: {kind: bool, param: is_wholesaler, label: "Wholesaler", tooltip: wholesaler}

  is_school_or_daycare:
    model: public_water_system
    display: {label: "Facility type (School or daycare)", sort: is_school_or_daycare, format: bool, csv_label: "Facility type (School or daycare)"}
    filter: {kind: bool, param: is_school_or_daycare, label: "School or daycare"}

  is_grant_eligible:
    model: public_water_system
    display: {label: "Grant eligible", sort: is_grant_eligible, format: bool, csv_label: "Grant eligible"}

  symbology_field:
    model: public_water_system
    display: {label: "Boundary type", sort: symbology_field, format: str, csv_label: "Boundary type"}
    filter:
      kind: radio
      param: symbology_field
      options:
        - {value: ~, label: "Both modeled and system sourced", default: true}   # null value = no filter
        - {value: Modeled, label: "Modeled only"}
        - {value: "System Sourced", label: "System sourced only"}

  area_sq_miles:
    model: public_water_system
    display: {label: "Size (sq mi)", sort: area_sq_miles, format: dec, csv_label: "Size (Area in square miles)"}
    filter: {kind: range, param_base: area, coercion: decimal, label: "Area in square miles", control: range_select, select_steps: area}

  open_health_viol:
    model: public_water_system
    display: {label: "Has open violations", sort: open_health_viol, format: bool, csv_label: "Has open violations"}
    filter: {kind: bool, param: has_open_violations, label: "Open violations"}

  # ── Violations — 5 year ────────────────────────────────────────────────────
  health_violations_5yr:
    model: violations_summary
    display: {label: "Health violations (5yr)", sort: health_violations_5yr, format: num, csv_label: "Health violations in the last 5 years"}

  groundwater_rule_5yr:
    model: violations_summary
    display: {label: "Groundwater rule violations (5yr)", sort: groundwater_rule_5yr, format: num, csv_label: "Ground water rule violations in the last 5 years"}
    filter: {kind: range, coercion: integer, label: "Ground water rule", tooltip: groundwater_rule}
    histogram: {format: count}

  surface_water_treatment_5yr:
    model: violations_summary
    display: {label: "Surface water treatment violations (5yr)", sort: surface_water_treatment_5yr, format: num, csv_label: "Surface water treatment rules violations in the last 5 years"}
    filter: {kind: range, coercion: integer, label: "Surface water treatment rules", tooltip: surface_water_treatment}
    histogram: {format: count}

  lead_and_copper_5yr:
    model: violations_summary
    display: {label: "Lead & copper violations (5yr)", sort: lead_and_copper_5yr, format: num, csv_label: "Lead & copper violations in the last 5 years"}
    filter: {kind: range, coercion: integer, label: "Lead & copper", tooltip: lead_and_copper}
    histogram: {format: count}

  radionuclides_5yr:
    model: violations_summary
    display: {label: "Radionuclides violations (5yr)", sort: radionuclides_5yr, format: num, csv_label: "Radionuclides violations in the last 5 years"}
    filter: {kind: range, coercion: integer, label: "Radionuclides", tooltip: radionuclides}
    histogram: {format: count}

  inorganic_chemicals_5yr:
    model: violations_summary
    display: {label: "Inorganic chemicals violations (5yr)", sort: inorganic_chemicals_5yr, format: num, csv_label: "Inorganic chemicals violations in the last 5 years"}
    filter: {kind: range, coercion: integer, label: "Inorganic chemicals", tooltip: inorganic_chemicals}
    histogram: {format: count}

  synthetic_organic_chemicals_5yr:
    model: violations_summary
    display: {label: "Synthetic organic chemicals violations (5yr)", sort: synthetic_organic_chemicals_5yr, format: num, csv_label: "Synthetic organic chemicals violations in the last 5 years"}
    filter: {kind: range, coercion: integer, label: "Synthetic organic chemicals", tooltip: synthetic_organic_chemicals}
    histogram: {format: count}

  volatile_organic_chemicals_5yr:
    model: violations_summary
    display: {label: "Volatile organic chemicals violations (5yr)", sort: volatile_organic_chemicals_5yr, format: num, csv_label: "Volatile organic chemicals violations in the last 5 years"}
    filter: {kind: range, coercion: integer, label: "Volatile organic chemicals", tooltip: volatile_organic_chemicals}
    histogram: {format: count}

  total_coliform_5yr:
    model: violations_summary
    display: {label: "Coliform violations (5yr)", sort: total_coliform_5yr, format: num, csv_label: "Coliform violations in the last 5 years"}
    filter: {kind: range, coercion: integer, label: "Coliform", tooltip: total_coliform}
    histogram: {format: count}

  stage_1_disinfectants_5yr:
    model: violations_summary
    display: {label: "Stage 1 disinfectants violations (5yr)", sort: stage_1_disinfectants_5yr, format: num, csv_label: "Stage 1 disinfectants violations in the last 5 years"}
    filter: {kind: range, coercion: integer, label: "Stage 1 disinfectants", tooltip: stage_1_disinfectants}
    histogram: {format: count}

  stage_2_disinfectants_5yr:
    model: violations_summary
    display: {label: "Stage 2 disinfectants violations (5yr)", sort: stage_2_disinfectants_5yr, format: num, csv_label: "Stage 2 disinfectants violations in the last 5 years"}
    filter: {kind: range, coercion: integer, label: "Stage 2 disinfectants", tooltip: stage_2_disinfectants}
    histogram: {format: count}

  # ── Violations — 10 year ───────────────────────────────────────────────────
  health_violations_10yr:
    model: violations_summary
    display: {label: "Health violations (10yr)", sort: health_violations_10yr, format: num, csv_label: "Health violations in the last 10 years"}

  groundwater_rule_10yr:
    model: violations_summary
    display: {label: "Groundwater rule violations (10yr)", sort: groundwater_rule_10yr, format: num, csv_label: "Ground water rule violations in the last 10 years"}
    filter: {kind: range, coercion: integer, label: "Ground water rule", tooltip: groundwater_rule}
    histogram: {format: count}

  surface_water_treatment_10yr:
    model: violations_summary
    display: {label: "Surface water treatment violations (10yr)", sort: surface_water_treatment_10yr, format: num, csv_label: "Surface water treatment rules violations in the last 10 years"}
    filter: {kind: range, coercion: integer, label: "Surface water treatment rules", tooltip: surface_water_treatment}
    histogram: {format: count}

  lead_and_copper_10yr:
    model: violations_summary
    display: {label: "Lead & copper violations (10yr)", sort: lead_and_copper_10yr, format: num, csv_label: "Lead & copper violations in the last 10 years"}
    filter: {kind: range, coercion: integer, label: "Lead & copper", tooltip: lead_and_copper}
    histogram: {format: count}

  radionuclides_10yr:
    model: violations_summary
    display: {label: "Radionuclides violations (10yr)", sort: radionuclides_10yr, format: num, csv_label: "Radionuclides violations in the last 10 years"}
    filter: {kind: range, coercion: integer, label: "Radionuclides", tooltip: radionuclides}
    histogram: {format: count}

  inorganic_chemicals_10yr:
    model: violations_summary
    display: {label: "Inorganic chemicals violations (10yr)", sort: inorganic_chemicals_10yr, format: num, csv_label: "Inorganic chemicals violations in the last 10 years"}
    filter: {kind: range, coercion: integer, label: "Inorganic chemicals", tooltip: inorganic_chemicals}
    histogram: {format: count}

  synthetic_organic_chemicals_10yr:
    model: violations_summary
    display: {label: "Synthetic organic chemicals violations (10yr)", sort: synthetic_organic_chemicals_10yr, format: num, csv_label: "Synthetic organic chemicals violations in the last 10 years"}
    filter: {kind: range, coercion: integer, label: "Synthetic organic chemicals", tooltip: synthetic_organic_chemicals}
    histogram: {format: count}

  volatile_organic_chemicals_10yr:
    model: violations_summary
    display: {label: "Volatile organic chemicals violations (10yr)", sort: volatile_organic_chemicals_10yr, format: num, csv_label: "Volatile organic chemicals violations in the last 10 years"}
    filter: {kind: range, coercion: integer, label: "Volatile organic chemicals", tooltip: volatile_organic_chemicals}
    histogram: {format: count}

  total_coliform_10yr:
    model: violations_summary
    display: {label: "Coliform violations (10yr)", sort: total_coliform_10yr, format: num, csv_label: "Coliform violations in the last 10 years"}
    filter: {kind: range, coercion: integer, label: "Coliform", tooltip: total_coliform}
    histogram: {format: count}

  stage_1_disinfectants_10yr:
    model: violations_summary
    display: {label: "Stage 1 disinfectants violations (10yr)", sort: stage_1_disinfectants_10yr, format: num, csv_label: "Stage 1 disinfectants violations in the last 10 years"}
    filter: {kind: range, coercion: integer, label: "Stage 1 disinfectants", tooltip: stage_1_disinfectants}
    histogram: {format: count}

  stage_2_disinfectants_10yr:
    model: violations_summary
    display: {label: "Stage 2 disinfectants violations (10yr)", sort: stage_2_disinfectants_10yr, format: num, csv_label: "Stage 2 disinfectants violations in the last 10 years"}
    filter: {kind: range, coercion: integer, label: "Stage 2 disinfectants", tooltip: stage_2_disinfectants}
    histogram: {format: count}

  # ── Non-health violations ──────────────────────────────────────────────────
  paperwork_violations_5yr:
    model: violations_summary
    display: {label: "Non-health violations (5yr)", sort: paperwork_violations_5yr, format: num, csv_label: "Non-health violations in the last 5 years"}
    filter: {kind: range, coercion: integer, label: "Non-health violations in the last 5 years"}
    histogram: {format: count}

  paperwork_violations_10yr:
    model: violations_summary
    display: {label: "Non-health violations (10yr)", sort: paperwork_violations_10yr, format: num, csv_label: "Non-health violations in the last 10 years"}
    filter: {kind: range, coercion: integer, label: "Non-health violations in the last 10 years"}
    histogram: {format: count}

  # ── Boil water ─────────────────────────────────────────────────────────────
  total_notices:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "total_bwn", cast: integer}
    display: {label: "Boil water notices", sort: total_notices, format: num, csv_label: "Boil water notices"}
    filter: {kind: range, param_base: boil_water_notices, coercion: integer, label: "Boil water notices", control: notices}

  # Loaded but not shown (boil-water columns).
  first_advisory_date:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "date_of_first_advisory", cast: string}

  last_advisory_date:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "date_of_last_advisory", cast: string}

  state_reporting_year_min:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "min_reporting_year_for_state", cast: string}

  state_reporting_year_max:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "max_reporting_year_for_state", cast: string}

  state:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "state", cast: string}

  tooltip_text:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "data_tool_tip", cast: string}

  download_url:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "download_link", cast: string}

  date_range_display:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "clean_date_range", cast: string}

  # ── Demographics ───────────────────────────────────────────────────────────
  total_population:
    model: demographic
    source: {file: epa_sabs_xwalk, header: "total_pop", cast: integer}
    display: {label: "Population size", sort: total_population, format: num, csv_label: "Population size"}

  population_density:
    model: demographic
    source: {file: epa_sabs_xwalk, header: "epic_pop_density", cast: decimal}
    display: {label: "Population density (per sq mi)", sort: population_density, format: dec, format_opts: {precision: 0}, csv_label: "Population density (people per square mile)"}
    filter: {kind: range, param_base: density, coercion: decimal, label: "People per square mile", control: range_select, select_steps: density}

  population_pct_change:
    model: trend_datum
    source: {file: xwalk_pct_change_10yr, header: "total_pop_pct_change_2011_2021", cast: decimal}
    display: {label: "Population change (10yr)", sort: population_pct_change_capped, format: pct, format_opts: {precision: 1}, csv_label: "Change in people in the last 10 years (%)"}
    filter: {kind: range, column: population_pct_change_capped, param_base: population_pct_change_capped, coercion: decimal, label: "Population change (10 years)", tooltip: population_change, slider_label: "Percentage change"}
    histogram: {format: percent_change, column: population_pct_change_capped}

  mhi_pct_change:
    model: trend_datum
    source: {file: xwalk_pct_change_10yr, header: "mhi_pct_change_2011_2021", cast: decimal}
    display: {label: "Income change (10yr)", sort: mhi_pct_change_capped, format: pct, format_opts: {precision: 1}, csv_label: "Change in income in the last 10 years (%)"}
    filter: {kind: range, column: mhi_pct_change_capped, param_base: mhi_pct_change_capped, coercion: decimal, label: "Median household income change (10 years)", tooltip: income_change, slider_label: "Percentage change"}
    histogram: {format: percent_change, column: mhi_pct_change_capped}

  # Loaded but not shown. The _capped columns are capped versions of the change metrics
