# ─────────────────────────────────────────────────────────────────────────────
# SINGLE FIELD MANIFEST — read by FieldRegistry (app/fields/field_registry.rb).
# See docs/CONFIG_AUDIT.md.
#
# The catalog of every data field: where each one is loaded from and how it's shown.
# (Filtering and sorting still read config/filters.yml for now — see docs/CONFIG_AUDIT.md.)
#
# This lists what the app SHOWS, not everything in the database — the data pipeline loads
# more columns than appear here. A field is added when we choose to load it and/or show it.
#
# Each field can include up to four blocks — add a block to turn that on, omit it to leave it off:
#   source    → loaded from a source file (a field may be source-only: loaded but not shown anywhere)
#   display   → shown as a column in the data table
#   filter    → can be filtered on
#   histogram → has a histogram
#
# ── CANONICAL ENTRY SHAPE — keys ALWAYS appear in this order; omit any block/key a field
#    does not have. Omission is the signal; we do not pad with nils. ──────────────────────
#
#   poverty_rate:                       # the name we store this column as (used throughout the app)
#     model: demographic                # which table it's stored in / loaded into
#     db_column: poverty_rate           # the real DB column, only if it differs from the name above (usually omit)
#     source:                           # how it's loaded from the data feed (omit → not loaded here; or a custom loader, see custom_imports)
#       file: epa_sabs_xwalk            #   source file name (no extension)
#       header: "hh_below_pov_per"      #   the column's exact name in that CSV — always quoted, copied verbatim
#       cast: decimal                   #   value type: integer | decimal | string | score (0–1 → %) | bool (omit → keep raw text)
#     display:                          # TABLE COLUMN (omit → not shown in the data table)
#       label: "Households below poverty line"  #   <th> header text
#       sort: poverty_rate              #   sort param (omit → not sortable); may differ from key (capped trends)
#       format: pct                     #   str | num | dec | pct | cur | bool | check | link | copy
#       format_opts: {precision: 1}     #   extra formatting opts (omit if none)
#       size: default                   #   default | sm | wide | pinned | check (omit → default)
#       row_header: true                #   sticky row header (pws_name only; omit → false)
#       pinned: true                    #   always visible, not hideable (omit → false)
#       source: ~                       #   read-path override; ~ for value-less cols (omit → derived from model)
#       category: demographics          #   TABLE column-picker group; ordered by the top-level `categories:`
#                                        #   block. Independent of filter.menu/section (e.g. cejst is table
#                                        #   category=environmental_justice but filter menu=population).
#       csv_label: "...the poverty line (%)"    #   verbose CSV header
#     filter:                           # FILTERABLE via URL param (omit → not filterable)
#       kind: range                     #   range | radio | bool | multiselect | place
#       param: has_source_protection    #   URL param (radio/bool/multiselect/place)
#       name_param: place_name          #   companion display-name param (place only)
#       column: population_pct_change_capped    # column the filter targets (omit → db_column)
#       param_base: density             #   URL param base for range _min/_max (omit → db_column)
#       coercion: decimal               #   decimal | integer (range only)
#       menu: population                #   filter menu: source|attributes|boundaries|compliance|population|more
#       section: socioeconomics         #   sub-section within the menu (omit menu+section → filterable but no UI control)
#     histogram:                        # HISTOGRAM-capable (omit → no histogram)
#       format: percent                 #   percent | currency | count | percent_change
#       column: population_pct_change_capped    # histogram column (omit → db_column)
#
# A displayed field is exported to CSV / GeoJSON automatically using its model's table and
# column — there is no export key to declare (only `check`, which has no model, is skipped).
#
# Menu/section TAG a filter's membership; the menu/section ORDER is a separate (hardcoded)
# layout concern that reads each filter's info from here. Tooltips are intentionally NOT
# consolidated here — tooltips.yml is concept-keyed and shared (see CONFIG_AUDIT §8.2).
# ─────────────────────────────────────────────────────────────────────────────

version: 1

# Permitted params with no owning field (map viewport, geographic scope).
passthrough_params: [bounds, county_geoid, state]

categories:
  - {key: utility_details,       label: "Utility Details"}
  - {key: violations,            label: "Violations"}
  - {key: demographics,          label: "Demographics"}
  - {key: environmental_justice, label: "Environmental Justice"}
  - {key: funding,               label: "Funding"}
  - {key: watershed_hazards,     label: "Watershed Hazards"}

# Source files that need special handling on load — combining rows, geometry, or computed
# values — instead of a plain column-to-column copy. Each lists the table it fills and why.
custom_imports:
  epa_sabs:                  {model: public_water_system, reason: "computes the state code from the PWSID; tracks which systems changed"}
  epa_sabs_geoms:            {model: public_water_system, reason: "GeoJSON geometry file, not a flat CSV"}
  sdwis_viols:               {model: violations_summary,  reason: "rolls raw violation rows up into 5- and 10-year totals"}
  pwsid_npdes_usts_rmps_imp: {model: watershed_hazard,    reason: "sums the per-HUC12 watershed rows into one row per system"}
  sabs_pwsid_county:         {model: public_water_system, reason: "combines the counties served into one deduplicated list per system"}

fields:
  # ── Row selection / identity (pinned, ungrouped) ───────────────────────────
  check:
    display: {format: check, size: check, pinned: true, source: ~}

  pws_name:
    model: public_water_system
    display: {label: "Utility Name", sort: pws_name, format: str, size: pinned, row_header: true, pinned: true, csv_label: "Utility Name"}

  # ── Utility details ────────────────────────────────────────────────────────
  pwsid:
    model: public_water_system
    display: {label: "Utility ID", sort: pwsid, format: copy, category: utility_details, csv_label: "Utility ID"}

  epa_report:
    model: public_water_system
    db_column: detailed_facility_report
    display: {label: "EPA Facility Report", format: link, size: sm, source: ~, category: utility_details, csv_label: "EPA Facility Report"}

  stusps:
    model: public_water_system
    display: {label: "State", sort: stusps, format: str, size: sm, category: utility_details, csv_label: "State"}

  counties:
    model: public_water_system
    display: {label: "County", sort: counties, format: str, size: wide, category: utility_details, csv_label: "County"}

  gw_sw_code:
    model: public_water_system
    display: {label: "Source type", sort: gw_sw_code, format: str, category: utility_details, csv_label: "Source type"}
    filter: {kind: radio, param: gw_sw_code, menu: source, section: primary_type}

  source_water_protection_code:
    model: public_water_system
    display: {label: "Has source water protection", sort: source_water_protection_code, format: bool, category: utility_details, csv_label: "Has source water protection"}
    filter: {kind: bool, param: has_source_protection, menu: source, section: protection}

  owner_type:
    model: public_water_system
    display: {label: "Ownership", sort: owner_type, format: str, category: utility_details, csv_label: "Ownership"}
    filter: {kind: multiselect, param: owner_type, menu: attributes, section: ownership}

  primacy_type:
    model: public_water_system
    display: {label: "Authority", sort: primacy_type, format: str, category: utility_details, csv_label: "Authority"}
    filter: {kind: multiselect, param: primacy_type, menu: attributes, section: authority}

  is_wholesaler:
    model: public_water_system
    display: {label: "Wholesaler", sort: is_wholesaler, format: bool, category: utility_details, csv_label: "Wholesaler"}
    filter: {kind: bool, param: is_wholesaler, menu: attributes, section: distribution}

  is_school_or_daycare:
    model: public_water_system
    display: {label: "Facility type (School or daycare)", sort: is_school_or_daycare, format: bool, category: utility_details, csv_label: "Facility type (School or daycare)"}
    filter: {kind: bool, param: is_school_or_daycare, menu: attributes, section: facility_type}

  is_grant_eligible:
    model: public_water_system
    display: {label: "Grant eligible", sort: is_grant_eligible, format: bool, category: utility_details, csv_label: "Grant eligible"}

  symbology_field:
    model: public_water_system
    db_column: service_area_type
    display: {label: "Boundary type", sort: symbology_field, format: str, category: utility_details, csv_label: "Boundary type"}
    filter: {kind: radio, param: symbology_field, menu: boundaries, section: boundary_type}

  area_sq_miles:
    model: public_water_system
    display: {label: "Size (sq mi)", sort: area_sq_miles, format: dec, category: utility_details, csv_label: "Size (Area in square miles)"}
    filter: {kind: range, param_base: area, coercion: decimal, menu: boundaries, section: size}

  open_health_viol:
    model: public_water_system
    display: {label: "Has open violations", sort: open_health_viol, format: bool, category: violations, csv_label: "Has open violations"}
    filter: {kind: bool, param: has_open_violations, menu: compliance, section: violations}

  # ── Violations — 5 year ────────────────────────────────────────────────────
  health_violations_5yr:
    model: violations_summary
    display: {label: "Health violations (5yr)", sort: health_violations_5yr, format: num, category: violations, csv_label: "Health violations in the last 5 years"}

  groundwater_rule_5yr:
    model: violations_summary
    display: {label: "Groundwater rule violations (5yr)", sort: groundwater_rule_5yr, format: num, category: violations, csv_label: "Ground water rule violations in the last 5 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  surface_water_treatment_5yr:
    model: violations_summary
    display: {label: "Surface water treatment violations (5yr)", sort: surface_water_treatment_5yr, format: num, category: violations, csv_label: "Surface water treatment rules violations in the last 5 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  lead_and_copper_5yr:
    model: violations_summary
    display: {label: "Lead & copper violations (5yr)", sort: lead_and_copper_5yr, format: num, category: violations, csv_label: "Lead & copper violations in the last 5 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  radionuclides_5yr:
    model: violations_summary
    display: {label: "Radionuclides violations (5yr)", sort: radionuclides_5yr, format: num, category: violations, csv_label: "Radionuclides violations in the last 5 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  inorganic_chemicals_5yr:
    model: violations_summary
    display: {label: "Inorganic chemicals violations (5yr)", sort: inorganic_chemicals_5yr, format: num, category: violations, csv_label: "Inorganic chemicals violations in the last 5 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  synthetic_organic_chemicals_5yr:
    model: violations_summary
    display: {label: "Synthetic organic chemicals violations (5yr)", sort: synthetic_organic_chemicals_5yr, format: num, category: violations, csv_label: "Synthetic organic chemicals violations in the last 5 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  volatile_organic_chemicals_5yr:
    model: violations_summary
    display: {label: "Volatile organic chemicals violations (5yr)", sort: volatile_organic_chemicals_5yr, format: num, category: violations, csv_label: "Volatile organic chemicals violations in the last 5 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  total_coliform_5yr:
    model: violations_summary
    display: {label: "Coliform violations (5yr)", sort: total_coliform_5yr, format: num, category: violations, csv_label: "Coliform violations in the last 5 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  stage_1_disinfectants_5yr:
    model: violations_summary
    display: {label: "Stage 1 disinfectants violations (5yr)", sort: stage_1_disinfectants_5yr, format: num, category: violations, csv_label: "Stage 1 disinfectants violations in the last 5 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  stage_2_disinfectants_5yr:
    model: violations_summary
    display: {label: "Stage 2 disinfectants violations (5yr)", sort: stage_2_disinfectants_5yr, format: num, category: violations, csv_label: "Stage 2 disinfectants violations in the last 5 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  # ── Violations — 10 year ───────────────────────────────────────────────────
  health_violations_10yr:
    model: violations_summary
    display: {label: "Health violations (10yr)", sort: health_violations_10yr, format: num, category: violations, csv_label: "Health violations in the last 10 years"}

  groundwater_rule_10yr:
    model: violations_summary
    display: {label: "Groundwater rule violations (10yr)", sort: groundwater_rule_10yr, format: num, category: violations, csv_label: "Ground water rule violations in the last 10 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  surface_water_treatment_10yr:
    model: violations_summary
    display: {label: "Surface water treatment violations (10yr)", sort: surface_water_treatment_10yr, format: num, category: violations, csv_label: "Surface water treatment rules violations in the last 10 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  lead_and_copper_10yr:
    model: violations_summary
    display: {label: "Lead & copper violations (10yr)", sort: lead_and_copper_10yr, format: num, category: violations, csv_label: "Lead & copper violations in the last 10 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  radionuclides_10yr:
    model: violations_summary
    display: {label: "Radionuclides violations (10yr)", sort: radionuclides_10yr, format: num, category: violations, csv_label: "Radionuclides violations in the last 10 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  inorganic_chemicals_10yr:
    model: violations_summary
    display: {label: "Inorganic chemicals violations (10yr)", sort: inorganic_chemicals_10yr, format: num, category: violations, csv_label: "Inorganic chemicals violations in the last 10 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  synthetic_organic_chemicals_10yr:
    model: violations_summary
    display: {label: "Synthetic organic chemicals violations (10yr)", sort: synthetic_organic_chemicals_10yr, format: num, category: violations, csv_label: "Synthetic organic chemicals violations in the last 10 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  volatile_organic_chemicals_10yr:
    model: violations_summary
    display: {label: "Volatile organic chemicals violations (10yr)", sort: volatile_organic_chemicals_10yr, format: num, category: violations, csv_label: "Volatile organic chemicals violations in the last 10 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  total_coliform_10yr:
    model: violations_summary
    display: {label: "Coliform violations (10yr)", sort: total_coliform_10yr, format: num, category: violations, csv_label: "Coliform violations in the last 10 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  stage_1_disinfectants_10yr:
    model: violations_summary
    display: {label: "Stage 1 disinfectants violations (10yr)", sort: stage_1_disinfectants_10yr, format: num, category: violations, csv_label: "Stage 1 disinfectants violations in the last 10 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  stage_2_disinfectants_10yr:
    model: violations_summary
    display: {label: "Stage 2 disinfectants violations (10yr)", sort: stage_2_disinfectants_10yr, format: num, category: violations, csv_label: "Stage 2 disinfectants violations in the last 10 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  # ── Non-health violations ──────────────────────────────────────────────────
  paperwork_violations_5yr:
    model: violations_summary
    display: {label: "Non-health violations (5yr)", sort: paperwork_violations_5yr, format: num, category: violations, csv_label: "Non-health violations in the last 5 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  paperwork_violations_10yr:
    model: violations_summary
    display: {label: "Non-health violations (10yr)", sort: paperwork_violations_10yr, format: num, category: violations, csv_label: "Non-health violations in the last 10 years"}
    filter: {kind: range, coercion: integer, menu: compliance, section: violations}
    histogram: {format: count}

  # ── Boil water ─────────────────────────────────────────────────────────────
  total_notices:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "total_bwn", cast: integer}
    display: {label: "Boil water notices", sort: total_notices, format: num, category: violations, csv_label: "Boil water notices"}
    filter: {kind: range, param_base: boil_water_notices, coercion: integer, menu: compliance, section: notices}

  # Loaded but not shown (boil-water columns).
  first_advisory_date:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "date_of_first_advisory", cast: string}

  last_advisory_date:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "date_of_last_advisory", cast: string}

  state_reporting_year_min:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "min_reporting_year_for_state", cast: string}

  state_reporting_year_max:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "max_reporting_year_for_state", cast: string}

  state:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "state", cast: string}

  tooltip_text:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "data_tool_tip", cast: string}

  download_url:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "download_link", cast: string}

  date_range_display:
    model: boil_water_summary
    source: {file: national_bwn_highlevel_summary, header: "clean_date_range", cast: string}

  # ── Demographics ───────────────────────────────────────────────────────────
  total_population:
    model: demographic
    source: {file: epa_sabs_xwalk, header: "total_pop", cast: integer}
    display: {label: "Population size", sort: total_population, format: num, category: demographics, csv_label: "Population size"}
    filter: {kind: range, coercion: decimal}
    histogram: {format: count}

  population_density:
    model: demographic
    source: {file: epa_sabs_xwalk, header: "epic_pop_density", cast: decimal}
    display: {label: "Population density (per sq mi)", sort: population_density, format: dec, format_opts: {precision: 0}, category: demographics, csv_label: "Population density (people per square mile)"}
    filter: {kind: range, param_base: density, coercion: decimal, menu: population, section: density}

  population_pct_change:
    model: trend_datum
    source: {file: xwalk_pct_change_10yr, header: "total_pop_pct_change_2011_2021", cast: decimal}
    display: {label: "Population change (10yr)", sort: population_pct_change_capped, format: pct, format_opts: {precision: 1}, category: demographics, csv_label: "Change in people in the last 10 years (%)"}
    filter: {kind: range, column: population_pct_change_capped, param_base: population_pct_change_capped, coercion: decimal, menu: population, section: change}
    histogram: {format: percent_change, column: population_pct_change_capped}

  mhi_pct_change:
    model: trend_datum
    source: {file: xwalk_pct_change_10yr, header: "mhi_pct_change_2011_2021", cast: decimal}
    display: {label: "Income change (10yr)", sort: mhi_pct_change_capped, format: pct, format_opts: {precision: 1}, category: demographics, csv_label: "Change in income in the last 10 years (%)"}
    filter: {kind: range, column: mhi_pct_change_capped, param_base: mhi_pct_change_capped, coercion: decimal, menu: population, section: change}
    histogram: {format: percent_change, column: mhi_pct_change_capped}

