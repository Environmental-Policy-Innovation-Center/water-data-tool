# Data table column definitions — loaded by ColumnRegistry at boot.
#
# The top-to-bottom order here IS the default column order shown to users.
# Drag-and-drop reordering overrides this via cols[] URL params.
# :check and :pws_name are always rendered first regardless of order.
#
# Keys:
#   key          — unique symbol; matches the DB column or method called to read the value
#   label        — <th> header text; nil for non-display columns (e.g. check)
#   sort         — sort param value passed in the URL; nil = non-sortable
#   format       — how the cell value is rendered: str, num, dec, pct, cur, bool, check, link
#   format_opts  — extra options passed to format helpers (e.g. { precision: 2 })
#   size         — column width: default, sm, wide, pinned, check
#   row_header   — true only for pws_name; renders <th scope="row"> sticky at left-7
#   pinned       — always visible; cannot be hidden via the column picker
#   source       — where cell data lives: pws = directly on PublicWaterSystem;
#                  any AR association name = traverse it first; ~ = no model data (:check, :link)
#   category     — column picker group key (matches a key in the categories list above); ~ = pinned/ungrouped
#   csv_label    — verbose CSV column header (intentionally more descriptive than label)
#   sql_expr     — raw SQL expression used by CSV and GeoJSON exports (e.g. pws.pwsid)
#                  bool-format columns automatically get ::text in CSV; no annotation needed

