# Data table column definitions — loaded by ColumnRegistry at boot.
#
# The top-to-bottom order here IS the default column order shown to users.
# Drag-and-drop reordering overrides this order via cols[] URL params.
# :check and :pws_name are always rendered first regardless of order.

columns:
  # Row selection
  - key: check
    label: ~
    sort: ~
    format: check
    format_opts: {}
    size: check
    pinned: true
    association: ~

  # Core identity
  - key: pws_name
    label: "Utility Name"
    sort: pws_name
    format: str
    format_opts: {}
    size: pinned
    row_header: true
    pinned: true
    association: pws

  - key: pwsid
    label: "Utility ID"
    sort: pwsid
    format: str
    format_opts: {}
    size: default
    association: pws

  - key: epa_report
    label: "EPA Facility Report"
    sort: ~
    format: link
    format_opts: {}
    size: sm
    association: pws

  - key: stusps
    label: "State"
    sort: stusps
    format: str
    format_opts: {}
    size: sm
    association: pws

  # Geography & system type
  - key: counties
    label: "County"
    sort: counties
    format: str
    format_opts: {}
    size: wide
    association: pws

  - key: gw_sw_code
    label: "Source type"
    sort: gw_sw_code
    format: str
    format_opts: {}
    size: default
    association: pws

  - key: source_water_protection_code
