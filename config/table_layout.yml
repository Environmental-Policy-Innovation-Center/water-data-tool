# ─────────────────────────────────────────────────────────────────────────────
# TABLE COLUMN LAYOUT — read by TableLayout (app/columns/table_layout.rb).
# Owns ARRANGEMENT (which columns show, their ORDER, and their column-picker category). What each
# column *is* — label, format, sort, source, csv_label — lives in the manifest, config/fields.yml;
# here we only reference columns by their manifest key. The table mirror of config/filter_layout.yml.
#
# SOURCE OF TRUTH, ONE-DIRECTIONAL — the layout points at the manifest, never the reverse:
#   • A field in fields.yml not listed here is simply hidden — no error (comment a column out to hide it).
#   • A column listed here MUST be a field with a `display:` block in fields.yml; a typo / non-displayable
#     key is skipped at runtime (no 500) and caught by the spec instead.
#
# ORDER = DEFINITION ORDER. Columns render left→right in the table (and top→bottom in the picker) in
# the order listed here; categories in the order their blocks appear. To reorder, move the block.
#
# STRUCTURE (every key shown):
#   pinned:                        # optional — field keys always shown and hidden from the picker
#     - check                      #   (NOT frozen-on-scroll — only checkbox + name stick on sideways scroll)
#     - pws_name
#   categories:                    # the column picker's groups; every non-pinned column lives in one
#     utility_details:             #   category key — internal group id, never shown to users
#       label: "Utility Details"   #   heading shown in the column picker
#       columns:                   #   ordered field keys, each a `display:` entry in fields.yml
#         - pwsid                  #   (e.g. `pwsid` here ↔ `pwsid:` in fields.yml)
#         - stusps
#
# spec/columns/table_layout_spec.rb keeps this in lockstep with the manifest (every column real,
# displayable, and listed once).
# ─────────────────────────────────────────────────────────────────────────────

pinned:
  - check
  - pws_name

