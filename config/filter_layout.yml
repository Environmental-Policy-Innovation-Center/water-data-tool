# ─────────────────────────────────────────────────────────────────────────────
# FILTER MENU LAYOUT — read by FilterLayout (app/filters/filter_layout.rb).
# See docs/CONFIG_AUDIT.md §8.4 and the filter taxonomy in docs/FILTERING.md.
#
# Placement, order, nesting, AND the copy for everything that has no manifest record.
# The manifest (config/fields.yml) owns what each filterable FIELD is (kind, param, label,
# tooltip, options, default); this file owns how filters are ARRANGED plus the copy for the
# menus / categories / parent-filters, which are not fields. Terms follow docs/FILTERING.md:
#
#   Menu       → topic tab; carries `label`
#   Category   → a named header within a menu; carries `label` + optional `tooltip` (ref into
#                tooltips.yml); no param of its own
#   Filter     → a toggleable filter option within a category (a field key referenced here;
#                its copy lives in the manifest)
#   Sub-filter → a more specific field nested under a parent filter
#
# Each menu → ordered `categories`. A category → `label`, optional `tooltip`, and ordered
# `filters`. A filter is either:
#   - a field key (a filterable field in fields.yml), or
#   - {filter_key: {label:, tooltip?, sub_filters: [field keys]}} — a parent filter that
#     reveals nested sub-filters (the 5yr/10yr violation filters and More → Watershed hazards;
#     these share the JS `subcat_panel` type). The filter_key is a layout-only id, never a field.
#     A parent's check-all comes with the pattern (it has `sub_filters`); its checked state is
#     derived from whether its members are on — nothing to declare here.
#
# A filterable field with no menu control (e.g. total_population) does not appear here — absence
# means "backend-only" (marked `backend_only` in the manifest). The backstop spec
# (spec/filters/filter_layout_spec.rb) keeps this file in lockstep with the manifest.
# ─────────────────────────────────────────────────────────────────────────────

version: 1

menus:
  source:
    label: "Source"
    categories:
      primary_type: {label: "Primary type", tooltip: primary_type, filters: [gw_sw_code]}
      place:        {label: "Place", filters: [place_geoid]}
      protection:   {label: "Protection", filters: [source_water_protection_code]}

  attributes:
    label: "Attributes"
    categories:
      ownership:     {label: "Ownership", filters: [owner_type]}
      authority:     {label: "Authority", filters: [primacy_type]}
      distribution:  {label: "Distribution", filters: [is_wholesaler]}
      facility_type: {label: "Facility type", filters: [is_school_or_daycare]}

  boundaries:
    label: "Boundaries"
    categories:
      boundary_type: {label: "Type", tooltip: boundary_type, filters: [symbology_field]}
      size:          {label: "Size", filters: [area_sq_miles]}

  compliance:
    label: "Compliance"
    categories:
      violations:
        label: "Violations"
        tooltip: violations
        filters:
          - open_health_viol
          - health_5yr:
              label: "Health violations in the last 5 years"
              sub_filters:
                - groundwater_rule_5yr
                - surface_water_treatment_5yr
                - lead_and_copper_5yr
                - radionuclides_5yr
                - inorganic_chemicals_5yr
                - synthetic_organic_chemicals_5yr
                - volatile_organic_chemicals_5yr
                - total_coliform_5yr
                - stage_1_disinfectants_5yr
                - stage_2_disinfectants_5yr
          - health_10yr:
              label: "Health violations in the last 10 years"
              sub_filters:
                - groundwater_rule_10yr
                - surface_water_treatment_10yr
                - lead_and_copper_10yr
                - radionuclides_10yr
                - inorganic_chemicals_10yr
                - synthetic_organic_chemicals_10yr
                - volatile_organic_chemicals_10yr
                - total_coliform_10yr
                - stage_1_disinfectants_10yr
                - stage_2_disinfectants_10yr
          - paperwork_violations_5yr
          - paperwork_violations_10yr
      notices: {label: "Notices", tooltip: boil_water_notices, filters: [total_notices]}

  population:
    label: "Population"
    categories:
      population_size: {label: "Population size", tooltip: population_size, filters: [pop_cat_5]}
      density:         {label: "Density", filters: [population_density]}
      change:          {label: "Change", filters: [population_pct_change, mhi_pct_change]}
      socioeconomics:
        label: "Socioeconomics"
        filters:
          - poverty_rate
          - unemployment_rate
          - median_household_income
          - bachelors_degree_rate
          - age_under_5_rate
          - age_over_61_rate
      race_ethnicity:
        label: "Race/Ethnicity"
        filters:
          - poc_rate
          - white_rate
          - black_rate
          - aian_rate
          - napi_rate
          - asian_rate
          - hispanic_rate
          - other_race_rate
          - mixed_race_rate
      vulnerability:
        label: "Vulnerability"
        filters:
          - cejst_disadvantaged_pct
          - svi_overall_pctl
          - cvi_overall_score

  more:
    label: "More"
    categories:
      financial: {label: "Financial", tooltip: annual_water_sewer_bill, filters: [most_common_rate_tier]}
      funding:
        label: "Funding (2021–2025)"
        tooltip: funding_2021_2025
        filters:
          - times_funded
          - total_srf_assistance
          - total_principal_forgiveness
      environmental:
        label: "Environmental"
        filters:
          - watershed_hazards:
              label: "Potential watershed hazards"
              tooltip: watershed_hazards
              sub_filters:
                - num_facilities
                - permit_effluent_violations
                - open_underground_storage_tanks
                - risk_management_plan_facilities
                - impaired_streams_303d
