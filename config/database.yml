default: &default
  adapter: postgis
  encoding: unicode
  # TODO: should 'pool' be used here instead of max_connections?
  # "Rails DB config usually uses 'pool' to set the max number of DB connections (rather than max_connections) — see e.g. config/database.yml in a typical Rails app"
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  <<: *default
  database: water_data_tool_development

test:
  <<: *default
  database: water_data_tool_test

production:
  # TODO: Align production env var names with the DB_* convention used above
  # (DATABASE_USERNAME → DB_USERNAME, WATER_DATA_TOOL_DATABASE_PASSWORD → DB_PASSWORD,
  # DATABASE_HOST → DB_HOST). Requires updating Kamal config and server env vars in sync.
  primary: &primary_production
    <<: *default
    database: water_data_tool_production
    username: <%= ENV.fetch("DATABASE_USERNAME", "water_data_tool") %>
    password: <%= ENV["WATER_DATA_TOOL_DATABASE_PASSWORD"] %>
    host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  cache:
    <<: *primary_production
    database: water_data_tool_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: water_data_tool_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: water_data_tool_production_cable
    migrations_paths: db/cable_migrate
