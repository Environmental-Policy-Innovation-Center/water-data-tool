default: &default
  adapter: postgis
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  port: 5432
  username: postgres
  password: postgres

development:
  <<: *default
  database: water_data_tool_development

test:
  <<: *default
  database: water_data_tool_test

production:
  primary: &primary_production
    <<: *default
    database: water_data_tool_production
    username: <%= ENV.fetch("DATABASE_USERNAME", "water_data_tool") %>
    password: <%= ENV["WATER_DATA_TOOL_DATABASE_PASSWORD"] %>
    host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  cache:
    <<: *primary_production
    database: water_data_tool_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: water_data_tool_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: water_data_tool_production_cable
    migrations_paths: db/cable_migrate
