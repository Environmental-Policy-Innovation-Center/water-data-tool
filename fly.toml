app = "water-data-tool-demo"
primary_region = "ord"

[build]

[env]
  RAILS_ENV = "production"
  RAILS_LOG_LEVEL = "info"
  HTTP_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-2x"
  memory = 1024
